<div class="container bg-primary text-black text-center">
  <h1 class="mb-3">Résultats de covoiturages</h1>
  <!-- Barre de filtres -->
  <div class="container mt-4">
    <!-- Bouton Hamburger (visible seulement sur petit écran) -->
    <button
      class="btn btn-outline-secondary filter-toggle bg-dark align-self-lg-center"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#filtreCollapse"
    >
      ☰ Filtres
    </button>

    <!-- Barre de filtres (collapsible sur petit écran) -->
    <div class="collapse d-md-block" id="filtreCollapse">
      <div
        class="filter-bar p-3 bg-secondary rounded shadow-sm mb-4 d-flex justify-content-center"
      >
        <form
          action="/pages/php/filtrerCovoiturages.php"
          method="get"
          class="row gy-3 gx-4 justify-content-center align-items-center w-100"
          style="max-width: 1200px"
        >
          <!-- Catégorie -->
          <!--Type de trajet-->
          <div class="col-12 col-md-6 col-lg-3">
            <label
              for="typeTrajet"
              class="form-label bg- rgba(217, 217, 217, 0.5)"
              >type de trajet</label
            >
            <select class="form-select" id="typeTrajet" name="typeTrajet">
              <option>Toutes</option>
              <option>Ecologique</option>
              <option>Standard</option>
            </select>
          </div>
          <!--Prix max-->
          <div class="col-12 col-md-6 col-lg-3">
            <label for="prixMax" class="form-label"
              >Prix maximum (Crédits)</label
            >
            <input
              type="number"
              class="form-control"
              id="prixMax"
              name="prixMax"
              placeholder="Ex : 20"
              min="0"
            />
          </div>
          <!--Durée max-->
          <div class="col-12 col-md-6 col-lg-3">
            <label for="DureeMax" class="form-label"
              >Durée maximum (minutes))</label
            >
            <input
              type="number"
              class="form-control"
              id="dureeMax"
              name="dureeMax"
              placeholder="Ex : 30"
              min="0"
            />
          </div>

          <!--Note Max-->
          <div class="col-12 col-md-6 col-lg-3">
            <label for="noteMin" class="form-label">Note minimale</label>
            <input
              type="number"
              class="form-control"
              id="noteMin"
              name="noteMin"
              max="10"
              min="0"
            />
          </div>
        </form>
      </div>
    </div>
    <!--Bouton de soumission-->
    <div class="col-12 text-center">
      <button type="submit" class="btn btn-dark">Appliquer les filtres</button>
    </div>

    <!-- Zone d'affichage des résultats -->
    <div id="resultats"></div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.querySelector("form");
    const resultats = document.getElementById("resultats");

    form.addEventListener("submit", function (e) {
      e.preventDefault(); // Empêche l'envoi classique

      // Récupération des valeurs
      const type = document.getElementById("typeTrajet").value;
      const prixMax = document.getElementById("prixMax").value;
      const dureeMax = document.getElementById("dureeMax").value;
      const noteMin = document.getElementById("noteMin").value;

      // Exemple de simulation de résultats (à remplacer par un appel AJAX)
      const trajetsSimules = [
        {
          conducteur: "Fani",
          note: 4.8,
          prix: 12,
          duree: 25,
          type: "ecologique",
        },
        {
          conducteur: "Jean",
          note: 4.2,
          prix: 18,
          duree: 35,
          type: "standard",
        },
      ];

      // Filtrage local simulé
      const filtres = trajetsSimules.filter((t) => {
        return (
          (!type || t.type === type) &&
          (!prixMax || t.prix <= prixMax) &&
          (!dureeMax || t.duree <= dureeMax) &&
          (!noteMin || t.note >= noteMin)
        );
      });

      // Affichage
      resultats.innerHTML = "";
      if (filtres.length === 0) {
        resultats.innerHTML = "<p>Aucun covoiturage trouvé.</p>";
      } else {
        filtres.forEach((t) => {
          const card = document.createElement("div");
          card.className = "card mb-3 p-3 bg-light";
          card.innerHTML = `
            <h5>${t.conducteur}</h5>
            <p>Note : ${t.note} ★</p>
            <p>Prix : ${t.prix} crédits</p>
            <p>Durée estimée : ${t.duree} min</p>
            <p>Type : ${t.type}</p>
            <button class="btn btn-primary">Voir le détail</button>
          `;
          resultats.appendChild(card);
        });
      }
    });
  });
</script>
